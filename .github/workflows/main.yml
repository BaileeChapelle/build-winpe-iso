name: Build WinPE with Auto-Launch Tools

on:
  workflow_dispatch: # Allows manual triggering from the Actions tab
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build WinPE
    runs-on: windows-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Windows ADK and WinPE Add-on
        shell: powershell
        run: |
          function Install-WithRetry {
              param ([string]$PackageName)
              choco install $PackageName -y --no-progress --execution-timeout=2700 --install-arguments="/quiet /norestart"
          }
          Install-WithRetry "windows-adk"
          Install-WithRetry "windows-adk-winpe"

      # === Core Step: Extract repository local tools ZIPs ===
      - name: Extract Local Tools ZIPs
        shell: powershell
        run: |
          Write-Host "Checking local tools from repository..."
          New-Item -ItemType Directory -Force -Path C:\WinNTSetup_Extracted
          New-Item -ItemType Directory -Force -Path C:\FreeCommander32_Extracted
          
          # 1. Extract WinNTSetup
          $NTSetupZip = "WinNTSetup_v542_x64.zip"
          if (Test-Path $NTSetupZip) {
              Write-Host "Extracting WinNTSetup..."
              Expand-Archive -Path $NTSetupZip -DestinationPath "C:\WinNTSetup_Extracted" -Force
          } else {
              Write-Error "Error: $NTSetupZip not found in repository root."
              exit 1
          }
          
          # 2. Extract 32-bit FreeCommander
          $FC32Zip = "FreeCommanderXE-32_portable941.zip"
          if (Test-Path $FC32Zip) {
              Write-Host "Extracting FreeCommander 32-bit..."
              Expand-Archive -Path $FC32Zip -DestinationPath "C:\FreeCommander32_Extracted" -Force
          } else {
              Write-Error "Error: $FC32Zip not found in repository root."
              exit 1
          }
          Write-Host "All tools extracted successfully!"

      - name: Create WinPE Files, Add Components and Build ISO
        shell: cmd
        run: |
          :: 1. 定位部署工具环境变量
          call "C:\Program Files (x86)\Windows Kits\10\Assessment and Deployment Kit\Deployment Tools\DandISetEnv.bat"
          
          :: 2. 创建 64 位 WinPE 工作目录
          call copype amd64 C:\winpe_amd64
          
          :: 3. 挂载镜像并灌入组件
          echo Mounting WinPE image...
          dism /Mount-Image /ImageFile:"C:\winpe_amd64\media\sources\boot.wim" /index:1 /MountDir:"C:\winpe_amd64\mount"
          
          echo Injecting Windows Components...
          set "OC_DIR=C:\Program Files (x86)\Windows Kits\10\Assessment and Deployment Kit\Windows Preinstallation Environment\amd64\WinPE_OCs"
          dism /Image:"C:\winpe_amd64\mount" /Add-Package /PackagePath:"%OC_DIR%\WinPE-WMI.cab"
          dism /Image:"C:\winpe_amd64\mount" /Add-Package /PackagePath:"%OC_DIR%\WinPE-NetFX.cab"
          dism /Image:"C:\winpe_amd64\mount" /Add-Package /PackagePath:"%OC_DIR%\WinPE-Scripting.cab"
          dism /Image:"C:\winpe_amd64\mount" /Add-Package /PackagePath:"%OC_DIR%\WinPE-PowerShell.cab"
          dism /Image:"C:\winpe_amd64\mount" /Add-Package /PackagePath:"%OC_DIR%\WinPE-StorageWMI.cab"
          dism /Image:"C:\winpe_amd64\mount" /Add-Package /PackagePath:"%OC_DIR%\WinPE-Wow64.cab"
          dism /Image:"C:\winpe_amd64\mount" /Add-Package /PackagePath:"%OC_DIR%\en-us\WinPE-Wow64_en-us.cab"

          :: 4. === 将解压出来的工具平铺复制进 PE 的 Program Files 目录 ===
          mkdir "C:\winpe_amd64\mount\Program Files\WinNTSetup"
          xcopy /e /y /h /i "C:\WinNTSetup_Extracted\*" "C:\winpe_amd64\mount\Program Files\WinNTSetup\"
          
          mkdir "C:\winpe_amd64\mount\Program Files\FreeCommander32"
          xcopy /e /y /h /i "C:\FreeCommander32_Extracted\*" "C:\winpe_amd64\mount\Program Files\FreeCommander32\"

          :: 5. === 将仓库根目录下的 Readme.txt 直接灌入 PE ===
          if exist Readme.txt copy /y Readme.txt "C:\winpe_amd64\mount\Windows\System32\Readme.txt"

          :: 6. === 核心：生成无冲突语法的并发多弹窗脚本 ===
          (
          echo @echo off
          echo title WinPE Core Launcher
          echo start "" "%%SystemDrive%%\Program Files\WinNTSetup\WinNTSetup_x64.exe"
          echo start "" "%%SystemDrive%%\Program Files\FreeCommander32\FreeCommander.exe"
          echo start "" notepad.exe %%SystemRoot%%\System32\Readme.txt
          echo cmd.exe 
          ) > "C:\winpe_amd64\mount\Windows\System32\launch_all.cmd"

          :: 7. === 修改引导外壳配置，使其优先调用多弹窗脚本 ===
          echo [LaunchApps] > "C:\winpe_amd64\mount\Windows\System32\winpeshl.ini"
          echo %%SystemRoot%%\System32\launch_all.cmd >> "C:\winpe_amd64\mount\Windows\System32\winpeshl.ini"
          
          :: 8. 将可能引起死锁的默认启动流脚本彻底置空
          echo @echo off > "C:\winpe_amd64\mount\Windows\System32\startnet.cmd"

          :: 9. 卸载并保存修改
          echo Unmounting and saving changes...
          dism /Unmount-Image /MountDir:"C:\winpe_amd64\mount" /Commit
          
          :: 10. 生成最终的 ISO 镜像
          echo Generating final ISO file...
          call MakeWinPEMedia /ISO C:\winpe_amd64 C:\winpe_amd64\WinPE_amd64.iso

      - name: Upload WinPE ISO
        uses: actions/upload-artifact@v7
        with:
          name: WinPE-ISO
          path: C:\winpe_amd64\WinPE_amd64.iso
          if-no-files-found: error
          retention-days: 5
