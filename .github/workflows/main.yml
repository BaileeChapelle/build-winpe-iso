name: Build WinPE with Auto-Launch Tools

on:
  workflow_dispatch: # Allows manual triggering from the Actions tab
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build WinPE
    runs-on: windows-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Windows ADK and WinPE Add-on
        shell: powershell
        run: |
          function Install-WithRetry {
              param ([string]$PackageName)
              choco install $PackageName -y --no-progress --execution-timeout=2700 --install-arguments="/quiet /norestart"
          }
          Install-WithRetry "windows-adk"
          Install-WithRetry "windows-adk-winpe"

      # === 1. 下载微软官方最新的 VC++ 运行库 ===
      - name: Download Latest VC++ Redistributable
        shell: powershell
        run: |
          Write-Host "Downloading VC++ Redistributables..."
          New-Item -ItemType Directory -Force -Path C:\VC_Redist
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "C:\VC_Redist\vc_redist_x64.exe"
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x86.exe" -OutFile "C:\VC_Redist\vc_redist_x86.exe"
          Write-Host "VC++ download completed successfully."

      # === 2. 仓库内压缩包：原地解压步骤 ===
      - name: Extract Local Tools ZIPs
        shell: powershell
        run: |
          Write-Host "Checking local tools from repository..."
          New-Item -ItemType Directory -Force -Path C:\WinNTSetup_Extracted
          New-Item -ItemType Directory -Force -Path C:\FarManager_Extracted
          
          # 解压 WinNTSetup
          $NTSetupZip = "WinNTSetup_v542_x64.zip"
          if (Test-Path $NTSetupZip) {
              Write-Host "Extracting WinNTSetup..."
              Expand-Archive -Path $NTSetupZip -DestinationPath "C:\WinNTSetup_Extracted" -Force
          } else {
              Write-Error "Error: $NTSetupZip not found in repository root."
              exit 1
          }
          
          # 解压 Far Manager
          $FarZip = "Far30b6699.x86.20260614.zip"
          if (Test-Path $FarZip) {
              Write-Host "Extracting Far Manager..."
              Expand-Archive -Path $FarZip -DestinationPath "C:\FarManager_Extracted" -Force
          } else {
              Write-Error "Error: $FarZip not found in repository root."
              exit 1
          }
          
          Write-Host "All tools extracted successfully!"

      - name: Create WinPE Files, Add Components and Build ISO
        shell: cmd
        run: |
          :: 1. 定位部署工具环境变量
          call "C:\Program Files (x86)\Windows Kits\10\Assessment and Deployment Kit\Deployment Tools\DandISetEnv.bat"
          
          :: 2. 创建 64 位 WinPE 工作目录
          call copype amd64 C:\winpe_amd64
          
          :: 3. 挂载镜像并灌入组件
          echo Mounting WinPE image...
          dism /Mount-Image /ImageFile:"C:\winpe_amd64\media\sources\boot.wim" /index:1 /MountDir:"C:\winpe_amd64\mount"
          
          echo Injecting Windows Components...
          set "OC_DIR=C:\Program Files (x86)\Windows Kits\10\Assessment and Deployment Kit\Windows Preinstallation Environment\amd64\WinPE_OCs"
          dism /Image:"C:\winpe_amd64\mount" /Add-Package /PackagePath:"%OC_DIR%\WinPE-WMI.cab"
          dism /Image:"C:\winpe_amd64\mount" /Add-Package /PackagePath:"%OC_DIR%\WinPE-NetFX.cab"
          dism /Image:"C:\winpe_amd64\mount" /Add-Package /PackagePath:"%OC_DIR%\WinPE-Scripting.cab"
          dism /Image:"C:\winpe_amd64\mount" /Add-Package /PackagePath:"%OC_DIR%\WinPE-PowerShell.cab"
          dism /Image:"C:\winpe_amd64\mount" /Add-Package /PackagePath:"%OC_DIR%\WinPE-StorageWMI.cab"
          
          :: 【核心追加】灌入 BitLocker 安全启动和解锁依赖组件
          dism /Image:"C:\winpe_amd64\mount" /Add-Package /PackagePath:"%OC_DIR%\WinPE-SecureStartup.cab"
          dism /Image:"C:\winpe_amd64\mount" /Add-Package /PackagePath:"%OC_DIR%\en-us\WinPE-SecureStartup_en-us.cab"

          :: 4. === 将解压出来的工具平铺复制进 PE 的 Program Files 目录 ===
          mkdir "C:\winpe_amd64\mount\Program Files\WinNTSetup"
          xcopy /e /y /h /i "C:\WinNTSetup_Extracted\*" "C:\winpe_amd64\mount\Program Files\WinNTSetup\"

          mkdir "C:\winpe_amd64\mount\Program Files\FarManager"
          xcopy /e /y /h /i "C:\FarManager_Extracted\*" "C:\winpe_amd64\mount\Program Files\FarManager\"

          :: 在 PE 里为其他安装包和软件创建专门的目录
          mkdir "C:\winpe_amd64\mount\Program Files\soft"
          if exist "%GITHUB_WORKSPACE%\7z2602-x64.exe" copy /y "%GITHUB_WORKSPACE%\7z2602-x64.exe" "C:\winpe_amd64\mount\Program Files\soft\"
          if exist "%GITHUB_WORKSPACE%\DOpusInstall-13.23.exe" copy /y "%GITHUB_WORKSPACE%\DOpusInstall-13.23.exe" "C:\winpe_amd64\mount\Program Files\soft\"
          
          :: === 将下载好的 VC++ 运行库安装包复制进 PE 内部的专门目录 ===
          mkdir "C:\winpe_amd64\mount\Windows\System32\Tools"
          copy /y "C:\VC_Redist\vc_redist_x64.exe" "C:\winpe_amd64\mount\Windows\System32\Tools\"
          copy /y "C:\VC_Redist\vc_redist_x86.exe" "C:\winpe_amd64\mount\Windows\System32\Tools\"

          :: 5. === 使用绝对路径确保 Readme.txt 成功灌入 PE ===
          if exist "%GITHUB_WORKSPACE%\Readme.txt" (
              copy /y "%GITHUB_WORKSPACE%\Readme.txt" "C:\winpe_amd64\mount\Windows\System32\Readme.txt"
          )

          :: 6. === 生成无冲突语法的并发多弹窗脚本（后台依次静默预装运行库与7z） ===
          (
          echo @echo off
          echo title WinPE Core Launcher
          echo :: 1. 优先后台静默安装 VC++ 运行库
          echo start /wait "" "%%SystemRoot%%\System32\Tools\vc_redist_x64.exe" /quiet /norestart
          echo start /wait "" "%%SystemRoot%%\System32\Tools\vc_redist_x86.exe" /quiet /norestart
          echo :: 2. 自动静默安装 7-Zip 到 PE 系统中 (使用大写 /S)
          echo if exist "%%SystemDrive%%\Program Files\soft\7z2602-x64.exe" start /wait "" "%%SystemDrive%%\Program Files\soft\7z2602-x64.exe" /S
          echo :: 3. 运行库与基础工具就绪后，全并发拉起你的核心图形界面
          echo start "" "%%SystemDrive%%\Program Files\WinNTSetup\WinNTSetup_x64.exe"
          echo start "" "%%SystemDrive%%\Program Files\FarManager\Far.exe"
          echo start "" notepad.exe %%SystemRoot%%\System32\Readme.txt
          echo cmd.exe 
          ) > "C:\winpe_amd64\mount\Windows\System32\launch_all.cmd"

          :: 7. === 修改引导外壳配置，使其优先调用多弹窗脚本 ===
          echo [LaunchApps] > "C:\winpe_amd64\mount\Windows\System32\winpeshl.ini"
          echo %%SystemRoot%%\System32\launch_all.cmd >> "C:\winpe_amd64\mount\Windows\System32\winpeshl.ini"
          
          :: 8. 将可能引起死锁的默认启动流脚本彻底置空
          echo @echo off > "C:\winpe_amd64\mount\Windows\System32\startnet.cmd"

          :: 9. 卸载并保存修改
          echo Unmounting and saving changes...
          dism /Unmount-Image /MountDir:"C:\winpe_amd64\mount" /Commit
          
          :: 10. 生成最终的 ISO 镜像
          echo Generating final ISO file...
          call MakeWinPEMedia /ISO C:\winpe_amd64 C:\winpe_amd64\WinPE_amd64.iso

      - name: Upload WinPE ISO
        uses: actions/upload-artifact@v7
        with:
          name: WinPE-ISO
          path: C:\winpe_amd64\WinPE_amd64.iso
          if-no-files-found: error
          retention-days: 5
