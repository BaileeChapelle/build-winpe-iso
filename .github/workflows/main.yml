name: Build Perfect WinPE

on:
  workflow_dispatch: # Allows manual triggering from the Actions tab
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build WinPE
    runs-on: windows-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Windows ADK and WinPE Add-on
        shell: powershell
        run: |
          function Install-WithRetry {
              param ([string]$PackageName)
              choco install $PackageName -y --no-progress --execution-timeout=2700 --install-arguments="/quiet /norestart"
          }
          Install-WithRetry "windows-adk"
          Install-WithRetry "windows-adk-winpe"

      # === 1. 原地解压仓库里的核心维护工具 ===
      - name: Extract Local Tools ZIPs
        shell: powershell
        run: |
          Write-Host "Extracting repository ZIPs..."
          New-Item -ItemType Directory -Force -Path C:\WinNTSetup_Extracted
          New-Item -ItemType Directory -Force -Path C:\FarManager_Extracted
          
          # 解压 WinNTSetup
          $NTSetupZip = "WinNTSetup_v542_x64.zip"
          if (Test-Path $NTSetupZip) {
              Expand-Archive -Path $NTSetupZip -DestinationPath "C:\WinNTSetup_Extracted" -Force
          } else {
              Write-Error "Error: $NTSetupZip not found."
              exit 1
          }
          
          # 解压 Far Manager (请确保你已经在仓库里把它替换成了 64 位的 zip 包，并在下面匹配好文件名)
          $FarZip = "Far30b6699.x86.20260614.zip"  # 如果你换了 64 位包，记得把这里也改成你的 64 位包名
          if (Test-Path $FarZip) {
              Expand-Archive -Path $FarZip -DestinationPath "C:\FarManager_Extracted" -Force
          } else {
              Write-Error "Error: $FarZip not found."
              exit 1
          }

      - name: Create WinPE Files, Add Components and Build ISO
        shell: cmd
        run: |
          :: 1. 定位部署工具环境变量
          call "C:\Program Files (x86)\Windows Kits\10\Assessment and Deployment Kit\Deployment Tools\DandISetEnv.bat"
          
          :: 2. 创建 64 位 WinPE 工作目录
          call copype amd64 C:\winpe_amd64
          
          :: 3. 挂载镜像并灌入可选组件
          echo Mounting WinPE image...
          dism /Mount-Image /ImageFile:"C:\winpe_amd64\media\sources\boot.wim" /index:1 /MountDir:"C:\winpe_amd64\mount"
          
          echo Injecting Windows Components...
          set "OC_DIR=C:\Program Files (x86)\Windows Kits\10\Assessment and Deployment Kit\Windows Preinstallation Environment\amd64\WinPE_OCs"
          dism /Image:"C:\winpe_amd64\mount" /Add-Package /PackagePath:"%OC_DIR%\WinPE-WMI.cab"
          dism /Image:"C:\winpe_amd64\mount" /Add-Package /PackagePath:"%OC_DIR%\WinPE-NetFX.cab"
          dism /Image:"C:\winpe_amd64\mount" /Add-Package /PackagePath:"%OC_DIR%\WinPE-Scripting.cab"
          dism /Image:"C:\winpe_amd64\mount" /Add-Package /PackagePath:"%OC_DIR%\WinPE-PowerShell.cab"
          dism /Image:"C:\winpe_amd64\mount" /Add-Package /PackagePath:"%OC_DIR%\WinPE-StorageWMI.cab"
          dism /Image:"C:\winpe_amd64\mount" /Add-Package /PackagePath:"%OC_DIR%\WinPE-SecureStartup.cab"
          dism /Image:"C:\winpe_amd64\mount" /Add-Package /PackagePath:"%OC_DIR%\en-us\WinPE-SecureStartup_en-us.cab"

          :: 4. === 【完美修复】直接从 Github 宿主机提取现成的 64 位 VC++ 核心依赖 DLL ===
          echo Copying 64-bit VC++ DLLs from Host System...
          copy /y "C:\Windows\System32\msvcp140*.dll" "C:\winpe_amd64\mount\Windows\System32\"
          copy /y "C:\Windows\System32\vcruntime140*.dll" "C:\winpe_amd64\mount\Windows\System32\"
          copy /y "C:\Windows\System32\concrt140.dll" "C:\winpe_amd64\mount\Windows\System32\"

          :: 5. === 复制工具到 Program Files ===
          mkdir "C:\winpe_amd64\mount\Program Files\WinNTSetup"
          xcopy /e /y /h /i "C:\WinNTSetup_Extracted\*" "C:\winpe_amd64\mount\Program Files\WinNTSetup\"

          mkdir "C:\winpe_amd64\mount\Program Files\FarManager"
          xcopy /e /y /h /i "C:\FarManager_Extracted\*" "C:\winpe_amd64\mount\Program Files\FarManager\"

          mkdir "C:\winpe_amd64\mount\Program Files\soft"
          if exist "%GITHUB_WORKSPACE%\7z2602-x64.exe" copy /y "%GITHUB_WORKSPACE%\7z2602-x64.exe" "C:\winpe_amd64\mount\Program Files\soft\"
          if exist "%GITHUB_WORKSPACE%\DOpusInstall-13.23.exe" copy /y "%GITHUB_WORKSPACE%\DOpusInstall-13.23.exe" "C:\winpe_amd64\mount\Program Files\soft\"

          :: 6. === 复制说明书 ===
          if exist "%GITHUB_WORKSPACE%\Readme.txt" copy /y "%GITHUB_WORKSPACE%\Readme.txt" "C:\winpe_amd64\mount\Windows\System32\Readme.txt"

          :: 7. === 优雅安全地逐行写入官方标准 startnet.cmd ===
          echo @echo off > "C:\winpe_amd64\mount\Windows\System32\startnet.cmd"
          echo wpeinit >> "C:\winpe_amd64\mount\Windows\System32\startnet.cmd"
          echo :: 自动后台静默安装 7-Zip >> "C:\winpe_amd64\mount\Windows\System32\startnet.cmd"
          echo if exist "%%SystemDrive%%\Program Files\soft\7z2602-x64.exe" start "" "%%SystemDrive%%\Program Files\soft\7z2602-x64.exe" /S >> "C:\winpe_amd64\mount\Windows\System32\startnet.cmd"
          echo :: 同期齐弹拉起所有前台工具 >> "C:\winpe_amd64\mount\Windows\System32\startnet.cmd"
          echo start "" "%%SystemDrive%%\Program Files\WinNTSetup\WinNTSetup_x64.exe" >> "C:\winpe_amd64\mount\Windows\System32\startnet.cmd"
          echo start "" "%%SystemDrive%%\Program Files\FarManager\Far.exe" >> "C:\winpe_amd64\mount\Windows\System32\startnet.cmd"
          echo start "" notepad.exe %%SystemRoot%%\System32\Readme.txt >> "C:\winpe_amd64\mount\Windows\System32\startnet.cmd"

          :: 8. 卸载并保存修改
          echo Unmounting and saving changes...
          dism /Unmount-Image /MountDir:"C:\winpe_amd64\mount" /Commit
          
          :: 9. 生成最终的 ISO 镜像
          echo Generating final ISO file...
          call MakeWinPEMedia /ISO C:\winpe_amd64 C:\winpe_amd64\WinPE_amd64.iso

      - name: Upload WinPE ISO
        uses: actions/upload-artifact@v7
        with:
          name: WinPE-ISO
          path: C:\winpe_amd64\WinPE_amd64.iso
          if-no-files-found: error
          retention-days: 5
